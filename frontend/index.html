<!DOCTYPE html>
<html>
<head>
  <title>TLS Scanner Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="max-w-5xl mx-auto p-6">

    <h1 class="text-3xl font-bold mb-6">🔐 TLS Scanner Dashboard</h1>

    <!-- INPUT -->
    <div class="flex gap-2 mb-6">
      <input id="target" class="flex-1 p-3 border rounded" placeholder="example.com:443"/>
      <button onclick="scan()" class="bg-blue-600 text-white px-6 py-3 rounded">
        Scan
      </button>
    </div>

    <!-- STATUS -->
    <div id="status" class="mb-4 text-gray-600"></div>

    <!-- RESULTS -->
    <div id="result" class="space-y-6"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
